<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="../build.css">
  <title>Frontend Mentor | QR code component</title>
</head>
<body class="bg-gray-300">

  <div class="bg-white w-[320px] h-[500px] p-4 m-auto rounded-lg mt-5">
    <img class="rounded-lg mb-5" src="../images/image-qr-code.png" alt="">
    <h2 class="text-blue-950 text-[22px] mb-5 text-center font-bold">Improve your front-end skills by building projects</h2>
    <p class="text-center font-semibold text-gray-500">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
  </div>
  

  
  
  <div class="attribution text-center mt-6">
    Challenge by <a class="font-bold" href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a class="font-bold" href="https://www.youtube.com/CodingTube">David Ruiz</a>.
  </div>
</body>
</html>
